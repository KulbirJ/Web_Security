# HAProxy Configuration File
# File: /etc/haproxy/haproxy.cfg
#
# Server: HAProxy 2.8.x+
# Purpose: Load balancer & reverse proxy with SSL/TLS termination
# Features: Security headers, TLS hardening, backend health checks

global
    # Process & Daemon Configuration
    log stdout local0
    log stdout local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin
    stats timeout 30s
    user haproxy
    group haproxy
    daemon

    # TLS Configuration
    ssl-default-bind-ciphers ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-CHACHA20-POLY1305
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets prefer-client-ciphers
    ssl-default-server-ciphers ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256
    ssl-default-server-options ssl-min-ver TLSv1.2 no-tls-tickets

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5000
    timeout client  50000
    timeout server  50000

    # Default error pages
    errorfile 400 /etc/haproxy/errors/400.http
    errorfile 403 /etc/haproxy/errors/403.http
    errorfile 408 /etc/haproxy/errors/408.http
    errorfile 500 /etc/haproxy/errors/500.http
    errorfile 502 /etc/haproxy/errors/502.http
    errorfile 503 /etc/haproxy/errors/503.http
    errorfile 504 /etc/haproxy/errors/504.http

# ====================================================
# HTTP Frontend - Redirect to HTTPS
# ====================================================
frontend http_front
    bind *:80
    mode http
    
    # Redirect all HTTP to HTTPS (301)
    redirect scheme https code 301 if !{ ssl_fc }

# ====================================================
# HTTPS Frontend - SSL/TLS Termination
# ====================================================
frontend https_front
    bind *:443 ssl \
        crt /etc/letsencrypt/live/yourdomain.com/fullchain.pem \
        crt /etc/letsencrypt/live/yourdomain.com/privkey.pem

    mode http
    
    # Compression
    compression algo gzip
    compression type text/html text/plain text/css text/javascript application/json

    # ====================================================
    # Security Headers (added via http-response)
    # ====================================================
    
    # Prevent MIME-type sniffing
    http-response set-header X-Content-Type-Options nosniff
    
    # Clickjacking protection
    http-response set-header X-Frame-Options DENY
    
    # Legacy XSS filter
    http-response set-header X-XSS-Protection "1; mode=block"
    
    # HSTS - Enforce HTTPS
    http-response set-header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    
    # Referrer Policy
    http-response set-header Referrer-Policy "strict-origin-when-cross-origin"
    
    # Cache Control
    http-response set-header Cache-Control "no-store, no-cache, must-revalidate"
    http-response set-header Pragma "no-cache"
    
    # Permissions Policy
    http-response set-header Permissions-Policy "geolocation=(), microphone=(), camera=()"
    
    # Content Security Policy
    http-response set-header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';"

    # ====================================================
    # Backend Selection
    # ====================================================
    
    # Default backend
    default_backend web_backend

# ====================================================
# Backend - Web Servers
# ====================================================
backend web_backend
    balance roundrobin
    mode http

    # Health check
    option httpchk GET / HTTP/1.1\r\nHost:\ yourdomain.com
    
    # Preserve client IP
    http-reuse safe
    
    # Backend servers
    server web1 10.0.1.10:8080 check inter 2000 rise 2 fall 5
    server web2 10.0.1.11:8080 check inter 2000 rise 2 fall 5
    server web3 10.0.1.12:8080 check inter 2000 rise 2 fall 5

# ====================================================
# Statistics Page (Optional)
# ====================================================
listen stats
    bind 127.0.0.1:8404
    stats enable
    stats uri /stats
    stats refresh 30s
    stats show-legends

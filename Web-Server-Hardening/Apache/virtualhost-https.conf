# Apache Virtual Host - Secure HTTPS Configuration
# File: /etc/apache2/sites-available/yourdomain.com.conf (Ubuntu)
#       /etc/httpd/conf.d/yourdomain.com.conf (CentOS)
#
# Server: Apache 2.4.58 / 2.4.59
# TLS: 1.2 and 1.3 only
# Includes: HTTP→HTTPS redirect, security headers, SSL hardening

# ====================================================
# HTTP VirtualHost - Redirect to HTTPS
# ====================================================
<VirtualHost *:80>
    ServerName yourdomain.com
    ServerAlias www.yourdomain.com
    
    # Redirect all HTTP traffic to HTTPS (301 Permanent)
    Redirect permanent / https://yourdomain.com/
</VirtualHost>

# ====================================================
# HTTPS VirtualHost - Main Configuration
# ====================================================
<VirtualHost *:443>
    ServerName yourdomain.com
    ServerAlias www.yourdomain.com
    ServerAdmin admin@yourdomain.com
    
    # Document root
    DocumentRoot /var/www/yourdomain.com/html

    # ====================================================
    # SSL/TLS Configuration
    # ====================================================
    SSLEngine on
    
    # Certificate files (Let's Encrypt)
    SSLCertificateFile /etc/letsencrypt/live/yourdomain.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/yourdomain.com/privkey.pem
    SSLCertificateChainFile /etc/letsencrypt/live/yourdomain.com/chain.pem
    
    # TLS Protocols - 1.2 and 1.3 only
    SSLProtocol all -SSLv2 -SSLv3 -TLSv1 -TLSv1.1
    
    # Cipher Configuration (modern, strong ciphers)
    SSLCipherSuite ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256
    SSLHonorCipherOrder on
    
    # Session management
    SSLSessionCache shmcb:/var/run/apache2/ssl_scache(512000)
    SSLSessionCacheTimeout 300
    SSLSessionTickets off
    
    # OCSP Stapling
    SSLUseStapling on
    SSLStaplingCache "shmcb:logs/ssl_stapling(32768)"

    # ====================================================
    # Security Headers
    # ====================================================
    
    # Prevent MIME-type sniffing
    Header always set X-Content-Type-Options "nosniff"
    
    # Clickjacking protection
    Header always set X-Frame-Options "DENY"
    
    # Content Security Policy - XSS mitigation
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';"
    
    # Legacy XSS filter
    Header always set X-XSS-Protection "1; mode=block"
    
    # HSTS - Enforce HTTPS
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    
    # Referrer Policy
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    
    # Cache Control
    Header always set Cache-Control "no-store, no-cache, must-revalidate"
    Header always set Pragma "no-cache"
    
    # Permissions Policy
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"
    
    # Hide server version
    ServerSignature Off
    ServerTokens Prod

    # ====================================================
    # Logging
    # ====================================================
    AccessFileName .htaccess
    ErrorLog ${APACHE_LOG_DIR}/yourdomain.com-error.log
    CustomLog ${APACHE_LOG_DIR}/yourdomain.com-access.log combined

    # ====================================================
    # Security Settings - Directory Browsing
    # ====================================================
    <Directory /var/www/yourdomain.com/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # ====================================================
    # Limit HTTP Methods
    # ====================================================
    RewriteEngine On
    RewriteCond %{REQUEST_METHOD} !^(GET|POST)$
    RewriteRule .* - [R=405,L]

    # ====================================================
    # Block Access to Sensitive Files
    # ====================================================
    <Files ~ "\.php$">
        Deny from all
    </Files>
    
    <Files ~ "\.config$">
        Deny from all
    </Files>
    
    <FilesMatch "^\.ht">
        Deny from all
    </FilesMatch>

    # ====================================================
    # Static Content Caching
    # ====================================================
    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresDefault "access plus 2 days"
        ExpiresByType text/html "access plus 1 day"
        ExpiresByType text/css "access plus 1 year"
        ExpiresByType application/javascript "access plus 1 year"
        ExpiresByType image/jpeg "access plus 1 month"
        ExpiresByType image/png "access plus 1 month"
        ExpiresByType image/gif "access plus 1 month"
    </IfModule>

</VirtualHost>

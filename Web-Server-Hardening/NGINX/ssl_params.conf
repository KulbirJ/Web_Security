# NGINX TLS/SSL Hardening Parameters
# Include in server block: include ssl_params.conf;
#
# Version: NGINX 1.24.x+
# Purpose: Centralized SSL/TLS configuration

# TLS Protocols - Minimum TLS 1.2
ssl_protocols TLSv1.2 TLSv1.3;

# Cipher Suite - Modern, strong ciphers
ssl_prefer_server_ciphers on;
ssl_ciphers "ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256";

# Session Cache (shared memory)
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 10m;

# Disable session tickets (for perfect forward secrecy)
ssl_session_tickets off;

# OCSP Stapling - Verify responses from OCSP responder
ssl_stapling on;
ssl_stapling_verify on;
ssl_stapling_responder http://ocsp.int-x3.letsencrypt.org;

# Resolver for OCSP stapling
resolver 1.1.1.1 8.8.8.8 valid=300s;
resolver_timeout 5s;

# Optional: DH Parameters (for forward secrecy with older clients)
# Generate: openssl dhparam -out /etc/nginx/dhparam.pem 2048
# ssl_dhparam /etc/nginx/dhparam.pem;

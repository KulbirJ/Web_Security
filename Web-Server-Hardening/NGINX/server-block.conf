# NGINX Server Block - Secure HTTPS Configuration
# File: /etc/nginx/sites-available/yourdomain.com.conf (Ubuntu)
#       /etc/nginx/conf.d/yourdomain.com.conf (CentOS)
#
# Server: NGINX 1.24.x / 1.25.x
# TLS Versions: 1.2 and 1.3 only
# Includes: HTTP→HTTPS redirect, security headers, SSL hardening

# ====================================================
# HTTP Block - Redirect to HTTPS
# ====================================================
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;
    
    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

# ====================================================
# HTTPS Block - Main Server Configuration
# ====================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ====================================================
    # SSL/TLS Configuration
    # ====================================================
    # SSL Certificate and Key
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/yourdomain.com/chain.pem;

    # TLS Protocols - 1.2 and 1.3 only
    ssl_protocols TLSv1.2 TLSv1.3;

    # Preferred ciphers - server controls selection
    ssl_prefer_server_ciphers on;
    ssl_ciphers "ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305";

    # Session management
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_stapling_responder http://ocsp.int-x3.letsencrypt.org;

    # DH Parameters (optional, for PFS)
    # ssl_dhparam /etc/nginx/dhparam.pem;

    # ====================================================
    # Security Headers
    # ====================================================
    
    # Prevent MIME-type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    
    # Clickjacking protection
    add_header X-Frame-Options "DENY" always;
    
    # Content Security Policy - XSS mitigation
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';" always;
    
    # Legacy XSS filter
    add_header X-XSS-Protection "1; mode=block" always;
    
    # HSTS - Enforce HTTPS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # Referrer Policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Cache Control
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    add_header Pragma "no-cache";
    
    # Permissions Policy
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # Hide NGINX version
    server_tokens off;

    # ====================================================
    # Logging
    # ====================================================
    access_log /var/log/nginx/yourdomain.com.access.log;
    error_log /var/log/nginx/yourdomain.com.error.log warn;

    # ====================================================
    # Root Directory & Index
    # ====================================================
    root /var/www/yourdomain.com/html;
    index index.html index.htm;

    # ====================================================
    # Security Settings
    # ====================================================
    
    # Disable directory listing
    autoindex off;
    
    # Limit HTTP methods
    location / {
        limit_except GET POST {
            deny all;
        }
        try_files $uri $uri/ =404;
    }

    # ====================================================
    # Static Files (CSS, JS, Images, Fonts)
    # ====================================================
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ====================================================
    # Deny Access to Sensitive Files
    # ====================================================
    location ~ /\. {
        deny all;
    }
    
    location ~ \.config$ {
        deny all;
    }
    
    location ~ \.sql$ {
        deny all;
    }
    
    location ~ \.exe$ {
        deny all;
    }

}
